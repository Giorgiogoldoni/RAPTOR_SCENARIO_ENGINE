name: RSE — Fetch Institutional PDFs

on:
  schedule:
    - cron: '0 8 1 1,3,5,7,9,11 *'  # 1° del mese dispari alle 10:00
  workflow_dispatch:

jobs:
  fetch-pdfs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests pdfplumber
      - name: Fetch PDFs
        run: python scripts/fetch_pdfs.py
      - name: Commit
        run: |
          git config --local user.email "rse-bot@github.com"
          git config --local user.name "RSE DataBot"
          git add data/
          git diff --staged --quiet || git commit -m "📚 PDF download $(date +'%Y-%m')"
          git push
