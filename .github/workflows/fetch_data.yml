name: Fetch Market Data

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 09:00 ora italiana (UTC+2) giorni feriali
    - cron: '0 14 * * 1-5'  # 16:00 ora italiana (UTC+2) giorni feriali
  workflow_dispatch:          # Esecuzione manuale dalla repo

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Fetch market data
       run: python scripts/fetch_market_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RWM DataBot"
          git add data/market_data.json
          git diff --staged --quiet || git commit -m "📊 Market data update $(date +'%Y-%m-%d %H:%M')"
          git push
